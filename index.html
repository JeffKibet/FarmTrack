<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Profit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <!-- NAVBAR -->
    <nav>
        <h1>🌱 FarmTrack</h1>
    </nav>

    <!-- HEADER -->
    <header>
        <h2>Farm Profit & Loss Calculator</h2>
        <p>Track your farm income, expenses, profits and losses.</p>
    </header>

     <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- INPUT SECTION -->
        <div class="form-section">

            <input type="number" id="income" placeholder="Enter Total Income">

            <input type="number" id="expenses" placeholder="Enter Total Expenses">

            <button id="calculate-btn">Save Record</button>

             </div>

        <!-- RESULT SECTION -->
        <div id="result"></div>

        <!-- SUMMARY CARDS -->
        <div class="cards">

            <div class="card">
                <h3>Total Income</h3>
                <p id="total-income">KES 0</p>
            </div>

            <div class="card">
                 <h3>Total Expenses</h3>
                <p id="total-expenses">KES 0</p>
            </div>

            <div class="card">
                <h3>Total Profit</h3>
                <p id="total-profit">KES 0</p>
            </div>

        </div>

          <!-- RECORDS SECTION -->
        <div class="records-section">

            <h2>Farm Records</h2>

            <ul id="records-list"></ul>

        </div>

    </div>

    <script src="code.js"></script>
</body>
</html>
